<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>ug-layout sandbox</title>
    <style>
      body {
        margin: 0;
        padding: 0;
        width: 100vw;
        height: 100vh;
        background: #1e1e1e;
        color: #fff;
        font-family: system-ui;
      }
      #app {
        width: 100%;
        height: 100%;
      }
      .ug-tile {
        background: #2a2a2a;
        border: 1px solid #444;
        display: flex;
        flex-direction: column; /* Allow header and content */
        font-size: 0.8rem;
        color: #888;
        box-sizing: border-box;
        transition: border-color 0.2s;
        overflow: hidden;
      }
      .ug-tile-header {
        background: #333;
        padding: 4px 8px;
        display: flex;
        align-items: center;
        justify-content: space-between;
        border-bottom: 1px solid #444;
        cursor: grab;
      }
      .ug-tile-header:active {
        cursor: grabbing;
      }
      .ug-tile-content {
        flex: 1;
        display: flex;
        align-items: center;
        justify-content: center;
      }
      .ug-tile.focused {
        border-color: #007acc;
      }
      .ug-tile.focused .ug-tile-header {
        background: #007acc;
        color: white;
      }
      .ug-tile.drag-over {
        border-color: #ffcc00;
        box-shadow: inset 0 0 10px rgba(255, 204, 0, 0.5);
      }
      .ug-controls {
        display: flex;
        gap: 4px;
      }
      .ug-btn {
        background: none;
        border: none;
        color: inherit;
        cursor: pointer;
        padding: 2px;
        display: flex;
        align-items: center;
        opacity: 0.7;
      }
      .ug-btn:hover {
        opacity: 1;
        background: rgba(255,255,255,0.1);
        border-radius: 2px;
      }
      /* If a tile is the only element, make it fill the space */
      .ug-tile.is-root {
        width: 100%;
        height: 100%;
      }
      .ug-split {
        display: grid;
        width: 100%;
        height: 100%;
      }
      .ug-gutter {
        background-color: #444;
        cursor: ew-resize;
      }
      .ug-gutter[data-direction="vertical"] {
        cursor: ns-resize;
      }
      body.dragging {
        user-select: none;
      }
    </style>
  </head>
  <body>
    <div id="app"></div>
    <script type="module" src="/src/main.ts"></script>
  </body>
</html>
